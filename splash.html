<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="4; url=home.html" />
  <title>CLIMA | Welcome</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-dark: #0d4025;
      --primary:      #1a6b3c;
      --accent:       #f4a020;
      --white:        #ffffff;
      --neutral-200:  #e8e8e0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--primary-dark);
      color: var(--white);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Full-screen background */
    .splash-bg {
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=1600&q=70') center/cover no-repeat;
      filter: brightness(0.35) saturate(1.3);
      z-index: 0;
    }

    .splash-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 700px;
    }

    .sdg-tag {
      display: inline-block;
      background: var(--accent);
      color: var(--primary-dark);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 2rem;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      letter-spacing: 0.08em;
      color: var(--white);
      line-height: 1;
      margin-bottom: 0.6rem;
      text-shadow: 0 4px 30px rgba(0,0,0,0.6);
    }

    .mission {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: var(--neutral-200);
      margin-bottom: 2rem;
      line-height: 1.65;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Team member list */
    .team-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2.2rem;
    }
    .team-list li {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2rem;
      padding: 0.3rem 0.9rem;
      font-size: 0.82rem;
      backdrop-filter: blur(4px);
    }

    /* CSS Loader animation */
    .loader-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .loader {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Countdown */
    #countdown {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    /* Skip button */
    .btn-skip {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.65rem 1.8rem;
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
    }
    .btn-skip:hover {
      background: var(--accent);
      color: var(--primary-dark);
    }

    /* Fade-in animation for content */
    .splash-content {
      animation: fadeUp 1s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="splash-bg" role="presentation" aria-hidden="true"></div>

  <div class="splash-content" role="main" aria-label="Welcome screen">
    <div class="sdg-tag">🌍 UN Sustainable Development Goal 13</div>
    <h1>CLIMA</h1>
    <p class="mission">
      A student-led website exploring urgent, practical climate action — because the decisions we make today determine the world we inherit tomorrow.
    </p>

    <ul class="team-list" aria-label="Team members">
      <li>👤 Pritisha Dawadee</li>
      <li>👤 Ajit Pandey</li>
      <li>👤 Najni Khatoon</li>
      <li>👤 Subina Upreti</li>
    </ul>

    <div class="loader-wrap" aria-live="polite">
      <div class="loader" aria-hidden="true"></div>
      <span id="countdown">Entering site in 4…</span>
    </div>

    <button class="btn-skip" id="skipBtn" aria-label="Skip intro and go to home page now">
      Skip Intro →
    </button>
  </div>

  <script>
    let seconds = 4;
    let interval;
    const countdownEl = document.getElementById('countdown');
    const skipBtn     = document.getElementById('skipBtn');

    function tick() {
      seconds--;
      if (seconds <= 0) {
        clearInterval(interval);
        countdownEl.textContent = 'Entering site…';
        window.location.href = 'home.html';
      } else {
        countdownEl.textContent = `Entering site in ${seconds}…`;
      }
    }

    interval = setInterval(tick, 1000);

    // Skip button: go immediately and cancel auto-redirect
    skipBtn.addEventListener('click', () => {
      clearInterval(interval);
      window.location.href = 'home.html';
    });
  </script>

</body>
</html>
